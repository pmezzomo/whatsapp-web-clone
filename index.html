<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WhatsApp Web Clone</title>
	<link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
	<div class="container">
		<aside class="sidebar">
			<div class="toolbar-container">
				<img class="user-photo toolbar-photo" src="img/avatar1.png" alt="Your profile photo">
				<div class="auxicons-toolbar-container">
					<i class="fas fa-spinner" aria-label="Status"></i>
					<i class="fas fa-comment-alt" aria-label="New chat"></i>
					<i class="fas fa-ellipsis-v" aria-label="Menu"></i>
				</div>
			</div>
			<div class="notification-container">
				<i class="fas fa-bell-slash" aria-hidden="true"></i>
				<p class="receive-notification">Receba notificações de novas mensagens</p>
				<p class="activate-notification">Ativar notificações na área de trabalho <i class="fas fa-angle-right" aria-hidden="true"></i></p>
			</div>
			<div class="search-container">
				<i id="contact-search" class="fas fa-search" aria-hidden="true"></i>
				<input type="text" id="search" name="search" placeholder="Procurar ou começar uma nova conversa" aria-label="Search contacts">
			</div>
			<div class="contacts-container">
				<div class="contact-box active-chat">
					<img class="user-photo contact-photo" src="img/avatar2.png" alt="Sabrina Matos">
					<div class="user-info">
						<p class="user-name">Sabrina Matos</p>
						<p class="user-messagepreview"><i class="fas fa-check-double" aria-hidden="true"></i>Oi, tudo bem?</p>
					</div>
					<div class="message-info">
						<p class="message-time">22:40</p>
					</div>
				</div>
				<div class="contact-box">
					<img class="user-photo contact-photo" src="img/avatar3.png" alt="João Augusto">
					<div class="user-info">
						<p class="user-name">João Augusto</p>
						<p class="user-messagepreview">Está disponível para um freela?</p>
					</div>
					<div class="message-info">
						<p class="message-time">12:30</p>
						<p class="message-pending">3</p>
					</div>
				</div>
				<div class="contact-box">
					<img class="user-photo contact-photo" src="img/avatar4.png" alt="Maria Silva">
					<div class="user-info">
						<p class="user-name">Maria Silva</p>
						<p class="user-messagepreview">O projeto ficou perfeito, obrigada!</p>
					</div>
					<div class="message-info">
						<p class="message-time">08:20</p>
						<p class="message-pending">5</p>
					</div>
				</div>
			</div>
		</aside>
		<main class="chat-container">
			<nav class="chat-navbar">
				<div class="contactinfo-container">
					<img class="user-photo contact-photo" src="img/avatar2.png" alt="Aléxia Couto">
					<p class="user-name">Aléxia Couto</p>
				</div>
				<ul class="chattools-container">
					<li><i class="fas fa-search" aria-label="Search"></i></li>
					<li><i class="fas fa-paperclip" aria-label="Attach file"></i></li>
					<li><i class="fas fa-ellipsis-v" aria-label="Menu"></i></li>
				</ul>
			</nav>
			<div class="messages-container">
				<div class="bg-image" aria-hidden="true"></div>
				<div class="chat-messages">
					<p class="guest-message">Olá, bom dia</p>
					<p class="user-message">Oi, tudo bem?</p>
				</div>
			</div>
			<div class="sendmessage-container">
				<i class="far fa-grin" aria-label="Emoji"></i>
				<input id="chatmessage" type="text" name="message" class="userinput" placeholder="Digite uma mensagem" aria-label="Type a message">
				<i class="fas fa-microphone" aria-label="Voice message"></i>
			</div>
		</main>
	</div>
</body>
</html>
